{% extends 'base.html' %}
{% block title %}Sign In - Chess Tournament{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12">
    <div class="card w-full max-w-md p-8 sm:p-10">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-display font-bold text-slate-900">Sign In</h1>
            <p class="text-slate-500 mt-2 text-sm">Welcome back to ChessHub</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                <input type="email" name="username" required class="form-input" placeholder="player@example.com">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                </div>
                <input type="password" name="password" required class="form-input" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary w-full mt-4">
                Sign In
            </button>
        </form>

        <div class="mt-6 border-t border-slate-200 pt-6 text-center">
            <p class="text-sm text-slate-600">
                Don't have an account? 
                <a href="{% url 'register' %}" class="font-medium text-brand-600 hover:text-brand-700 transition-colors">Create one now</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
