{% extends 'base.html' %}
{% block title %}Login - Chess Tournament{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md animate-fadeInUp">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-accent to-purple-600 flex items-center justify-center animate-float">
                <i class="fas fa-chess-king text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-display font-bold text-white">Welcome Back</h1>
            <p class="text-slate-400 mt-2">Sign in to your tournament account</p>
        </div>

        <div class="glass-card p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" name="username" required class="form-input" placeholder="Enter your username">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required class="form-input" placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary w-full justify-center text-lg py-3">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <p class="text-center text-slate-400 mt-6 text-sm">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-accent-light hover:text-white transition font-medium">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
