databases:
  - name: chess-db
    databaseName: chess
    user: chess_user

services:
  - type: web
    name: chess-tournament
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn chess_tournament.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chess-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
